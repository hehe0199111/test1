<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗剪纸手势交互绘图系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Microsoft YaHei', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .main-container {
            display: flex;
            gap: 30px;
            max-width: 1800px;
            width: 100%;
            padding: 20px;
        }
        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(220, 20, 60, 0.4), inset 0 0 40px rgba(0, 0, 0, 0.5);
            background: #000;
            flex: 1;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 1;
            pointer-events: none;
            z-index: 0;
        }
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            z-index: 2;
        }
        #uiCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 3;
        }
        .control-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(220, 20, 60, 0.6);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .panel h3 {
            color: #dc143c;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 2px solid rgba(220, 20, 60, 0.3);
            padding-bottom: 10px;
        }
        .status-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 13px;
        }
        .status-value {
            color: #00ff00;
        }
        .gesture-indicator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .gesture-item {
            padding: 10px;
            background: rgba(100, 100, 100, 0.3);
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .gesture-item.active {
            background: rgba(0, 255, 0, 0.2);
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #dc143c, #ff1493);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 20, 60, 0.5);
        }
        .color-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 10px 0;
        }
        .color-btn {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 15px currentColor;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-container label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(220, 20, 60, 0.3);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #dc143c;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.6);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #dc143c;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.6);
        }
        select {
            width: 100%;
            padding: 8px;
            background: rgba(220, 20, 60, 0.2);
            color: #fff;
            border: 1px solid rgba(220, 20, 60, 0.5);
            border-radius: 6px;
            cursor: pointer;
            margin: 5px 0;
        }
        .title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            margin: 0;
            z-index: 10;
            color: #ff1493;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <script src="code/hands.js"></script>

    <div class="main-container">
        <div class="canvas-wrapper">
            <div class="title">✂️ 非遗剪纸</div>
            <div class="canvas-container">
                <video id="video" playsinline></video>
                <canvas id="bgCanvas"></canvas>
                <canvas id="drawCanvas"></canvas>
                <canvas id="uiCanvas"></canvas>
            </div>
        </div>

        <div class="control-panel">
            <div class="panel">
                <h3>📊 实时状态</h3>
                <div class="status-display">
                    <span>识别状态：</span>
                    <span class="status-value" id="detectionStatus">等待中...</span>
                </div>
                <div class="status-display">
                    <span>当前模式：</span>
                    <span class="status-value" id="modeStatus">准备中...</span>
                </div>
                <div class="status-display">
                    <span>手势：</span>
                    <span class="status-value" id="gestureStatus">-</span>
                </div>

                <div style="margin-top: 15px;">
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 8px;">当前检测的手势：</div>
                    <div class="gesture-indicator">
                        <div class="gesture-item" id="gesture-fist">✊ 握拳<br/><small>（镂空）</small></div>
                        <div class="gesture-item" id="gesture-open">✋ 摊手<br/><small>（填充）</small></div>
                        <div class="gesture-item" id="gesture-pinch">✌️ 捏合<br/><small>（绘制）</small></div>
                        <div class="gesture-item" id="gesture-two">☝️ 双指<br/><small>（变换）</small></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>🎨 绘图设置</h3>
                <div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">选择颜色：</div>
                <div class="color-selector">
                    <button class="color-btn active" style="background: #dc143c;" data-color="#dc143c" title="深红"></button>
                    <button class="color-btn" style="background: #ff1493;" data-color="#ff1493" title="紫红"></button>
                    <button class="color-btn" style="background: #ff4500;" data-color="#ff4500" title="橙红"></button>
                    <button class="color-btn" style="background: #ffd700;" data-color="#ffd700" title="金色"></button>
                </div>

                <div class="slider-container">
                    <label for="brushSize">笔刷大小: <span id="sizeValue">15</span>px</label>
                    <input type="range" id="brushSize" min="2" max="80" value="15">
                </div>

                <div class="slider-container">
                    <label for="opacity">不透明度: <span id="opacityValue">100</span>%</label>
                    <input type="range" id="opacity" min="0" max="100" value="100">
                </div>
            </div>

            <div class="panel">
                <h3>✨ 效果设置</h3>
                <div style="margin: 10px 0;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="symmetry" checked>
                        <span style="font-size: 13px;">对称模式</span>
                    </label>
                </div>
                <div style="margin: 10px 0;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="glow" checked>
                        <span style="font-size: 13px;">发光效果</span>
                    </label>
                </div>
                <div class="slider-container">
                    <label for="symmetryLines">对称线数: <span id="symmetryValue">4</span></label>
                    <input type="range" id="symmetryLines" min="2" max="8" value="4">
                </div>
            </div>

            <div class="panel">
                <h3>💾 操作</h3>
                <div class="button-group">
                    <button onclick="clearCanvas()">🗑️ 清除</button>
                    <button onclick="undoDrawing()">↶ 撤销</button>
                </div>
                <div class="button-group" style="margin-top: 10px;">
                    <button onclick="savePNG()">💾 保存PNG</button>
                    <button onclick="saveSVG()">📐 保存SVG</button>
                </div>
                <div class="button-group" style="margin-top: 10px;">
                    <button onclick="loadPattern('flower')">🌸 花瓣</button>
                    <button onclick="loadPattern('snowflake')">❄️ 雪花</button>
                    <button onclick="loadPattern('spiral')">🌀 螺旋</button>
                    <button onclick="loadPattern('circle')">⭕ 圆环</button>
                    <button onclick="loadPattern('diamond')">💎 菱形</button>
                    <button onclick="loadPattern('star')">🌟 八角星</button>
                </div>
                <div style="margin-top: 15px; padding: 10px; background: rgba(0, 255, 0, 0.1); border-radius: 6px; font-size: 12px; color: #aaa;">
                    <p style="margin-bottom: 8px; color: #00ff00; font-weight: bold;">📋 使用说明</p>
                    <p>✊ 握拳=镂空（黑色）</p>
                    <p>✋ 摊手=填充（红色）</p>
                    <p>☝️ 单指绘制轮廓</p>
                    <p>✌️ 双指缩放旋转</p>
                </div>
            </div>
        </div>
    </div>

    <script src="code/config.js"></script>
    <script src="code/camera.js"></script>
    <script src="code/gestures.js"></script>
    <script src="code/drawing.js"></script>
    <script src="code/patterns.js"></script>
    <script src="code/export.js"></script>
    <script src="code/ui.js"></script>
    <script src="code/main.js"></script>
</body>
</html>
